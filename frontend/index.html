<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minhas Tarefas</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
  <header class="header">
    <div class="logo">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="12" fill="#3B82F6"/>
        <path d="M32 17L21 28L16 23" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1 class="title">Minhas Tarefas</h1>
    <p class="subtitle">Organize suas tarefas de forma simples e eficiente</p>
  </header>

  <button class="btn-new-task" id="btnNewTask">
    <i data-lucide="badge-plus"></i>
    Nova Tarefa
  </button>

  <section class="tabs">
    <button class="tab active" data-filter="all">
      Todas
      <span class="badge" id="badgeAll">0</span>
    </button>
    <button class="tab" data-filter="todo">
      A Fazer
      <span class="badge" id="badgeTodo">0</span>
    </button>
    <button class="tab" data-filter="doing">
      Em Progresso
      <span class="badge" id="badgeDoing">0</span>
    </button>
    <button class="tab" data-filter="done">
      Concluídas
      <span class="badge" id="badgeDone">0</span>
    </button>
  </section>

  <section class="tasks-list" id="tasksList">

  </section>

  <div class="empty-state" id="emptyState">
    <div class="circle">
      <i data-lucide="frown"></i>
    </div>
    <h3>Nenhuma tarefa encontrada</h3>
    <p>Crie uma tarefa clicando no botão Nova Tarefa</p>
  </div>

  <div class="modal" id="taskModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Nova Tarefa</h2>
        <button class="btn-close" id="btnCloseModal">
          <i data-lucide="x"></i>
        </button>
      </div>
      <form id="taskForm">
        <div class="form-group">
          <input
                  type="text"
                  id="taskTitle"
                  class="form-input"
                  placeholder="Título da tarefa"
                  required
          >
        </div>
        <div class="form-group">
                    <textarea
                            id="taskDescription"
                            class="form-input form-textarea"
                            placeholder="Descrição (opcional)"
                    ></textarea>
        </div>
        <div class="form-group">
          <input
                  type="text"
                  id="taskCategory"
                  class="form-input"
                  placeholder="Categoria da tarefa"
                  required
          >
        </div>
        <div class="form-row">
          <div class="form-group">
            <select id="taskStatus" class="form-select">
              <option value="todo">A Fazer</option>
              <option value="doing">Em Progresso</option>
              <option value="done">Concluído</option>
            </select>
          </div>
          <div class="form-group">
            <select id="taskPriority" class="form-select">
              <option value="baixa">Baixa</option>
              <option value="media">Média</option>
              <option value="alta">Alta</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="btnCancel">Cancelar</button>
          <button type="submit" class="btn-submit" id="btnSubmit">
            <i data-lucide="check"></i>
            Criar
          </button>
        </div>
      </form>
    </div>
  </div>

</div>

  <script src="https://unpkg.com/lucide@latest"></script>

  <script src="script.js"></script>
</body>
</html>
